<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Cache-Control" content="no-transform" />
		<meta name="applicable-device" content="pc,mobile">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<meta name="viewport" content="initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title></title>
		<meta name="keywords" content="" />
		<meta name="description" content="" />
		<link rel="stylesheet" href="css/slicy.css" />
		<link rel="stylesheet" href="css/swiper.min.css" />
		<link rel="stylesheet" href="css/style.css" />
	</head>

	<body>
		
		<div class="layout">
			<div class="section1">
				<div class="htit">
					<div class="icon">
						<a href="#"><img src="images/hprev.png" ></a>
						<a href="#"><img src="images/hnext.png" ></a>
					</div>
					<div class="hrt">
						<a href="home.html"><img src="images/homebtn.png" ></a>
					</div>
				</div>
				<div class="hmain">
					<h6 class="wshow">正在处理</h6>
					<h6 class="whide">完成</h6>
					<div class="huanse">
						<ul>
							<li>
								<img src="images/hpic.png" >
							</li>
							<li>
								<img src="images/hpic3.png" >
							</li>
						</ul>
					</div>
					<h2 class="wshow">AI智能换发色中...</h2>
					<div class="swiperlist wshow">
						<ul class="swiper-wrapper">
							<li class="swiper-slide"><i>🔍用户肤色分析完成</i></li>
							<li class="swiper-slide"><i>✂️正在分析发型风格...</i></li>
							<li class="swiper-slide"><i>🎨正在智能合成新发型...</i></li>
							<li class="swiper-slide"></li>
							<li class="swiper-slide"></li>
							<li class="swiper-slide"></li>
						</ul>
					</div>
					<div class="qxbtn wshow">
						取消生成
					</div>
					<!-- 成功 -->
					<div class="whide1">
						<h2>换发色完成！</h2>
						<div class="activeimg on">
							<img src="images/hpic3.png" >
							<i>建议烫染，实际效果会因自身因素变化，请与发型师沟通确认。</i>
						</div>
						<div class="flexbtn">
							<a href="javascript:;" class="rbt1">注册并保存</a>
							<a href="javascript:;" class="rbt2">3d展示</a>
						</div>
					</div>
					<!-- 失败 -->
					<div class="whide2">
						<h2>换发色失败！</h2>
						<div class="activeimg ">
							<img src="images/hpic3.png" >
							<div class="mk">
								<img src="images/hicon4.png" >
							</div>
						</div>
						<div class="flexbtn">
							<a href="#">重新生成</a>
						</div>
					</div>
					
					<div class="mask">
						<div class="flexcent">
							<div class="mpic">
								<img src="images/hpic3.png" >
							</div>
							<div class="flexbtn">
								<a href="javascript:;" class="rbt3">关闭</a>
							</div>
						</div>
					</div>
					
					
				</div>
			</div>
			
			
		</div>	
		

		<script src="js/jquery-3.5.1.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/swiper.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/script.js" type="text/javascript" charset="utf-8"></script>
		<script type="text/javascript">
			$(function(){
				var active = true;
				var swiper = new Swiper('.swiperlist', {
				slidesPerView: 3, 
				direction: "vertical",
				autoplay: {
				delay: 1000,
				stopOnLastSlide: true, //如果设置为true，当切换到最后一个slide时停止自动切换。（loop模式下无效）。
				disableOnInteraction: false, //用户操作swiper之后，是否禁止autoplay。默认为true：停止。
				},
				observer:true,
				observeParents:true,
				});
				
				setTimeout(function(){
					if(active == true){
						$('.wshow').hide();
						$('.whide').show();
						$('.whide1').show();
					}else{
						$('.wshow').hide();
						$('.whide').show();
						$('.whide2').show();
					}
				},4000)
			})
			
			$('.flexbtn .rbt1').click(function(){
				$('.mask').hide();
			})
			$('.flexbtn .rbt2').click(function(){
				$('.mask').show();
			})
			$('.flexbtn .rbt3').click(function(){
				$('.mask').hide();
			})
		</script>
		
		
		
	</body>
</html>
