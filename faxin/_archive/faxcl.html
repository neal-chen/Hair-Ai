		<script type="text/javascript">
			$(function() {

				var swiper = new Swiper('.swiperlist', {

						disableOnInteraction: false, //用户操作swiper之后，是否禁止autoplay。默认为true：停止。
					},
					observer: true,
					observeParents: true,
				});
				
				var swiper = new Swiper('.swiperpic', {
				navigation: {
				nextEl: '.swiperpic .next',
				prevEl: '.swiperpic .prev',
				},
				slidesPerView: 1, //横屏屏个数
				autoplay: {
				delay: 3000,
				stopOnLastSlide: false, //如果设置为true，当切换到最后一个slide时停止自动切换。（loop模式下无效）。
				disableOnInteraction: false, //用户操作swiper之后，是否禁止autoplay。默认为true：停止。
				},
				observer:true,
				observeParents:true,
				});
				
				$('.faxpic ul li').click(function(){

				})
				
				$('.flexbtn a.rbt1').click(function(){

					$(".whidese").show();

				$('.flexbtn a.rbt3').click(function(){

					$(".wshowpic").hide();

				$('.flexbtn a.rbt4').click(function(){

					$(".whidese").hide();
				})
				$('.flexbtn a.rbt5').click(function(){
					$(".wshowcg").show();
					$(".whidese").hide();
				})
				$('.flexbtn a.rbt6').click(function(){
					$(".wshowcg").hide();
					$(".whidese").show();
				})
				$('.flexbtn a.rbt7').click(function(){
					$(".wshowsand").hide();
					$(".wshowpic").show();
				})
				
				
				
				

				setTimeout(function() {
					if (active == true) {
						$('.wshow').hide();
						$('.whide').show();
						$('.whide1').show();
					} else {
						$('.wshow').hide();
						$('.whide').show();
						$('.whide2').show();

			})
			
			
			$(function() {
			  let currentColor = '#ff0000';
			  const $wheel = $('#color-wheel');
			  
			  const CANVAS_SIZE = 200; 
			  const CENTER = CANVAS_SIZE / 2;
			
			  // 2. 初始化Canvas（固定像素，保证绘制不空白）
			  const canvas = document.createElement('canvas');
			  canvas.width = CANVAS_SIZE;
			  canvas.height = CANVAS_SIZE;
			  $wheel.append(canvas);
			  const ctx = canvas.getContext('2d');
			
			  // 3. 简化绘制逻辑（逐行绘制，性能更高，无空白）
			  const drawColorWheel = () => {
			    // 创建ImageData对象，批量绘制（避免逐像素循环卡顿）
			    const imageData = ctx.createImageData(CANVAS_SIZE, CANVAS_SIZE);
			    const data = imageData.data;
			
			    for (let y = 0; y < CANVAS_SIZE; y++) {
			      for (let x = 0; x < CANVAS_SIZE; x++) {
			        const dx = x - CENTER;
			        const dy = y - CENTER;
			        const r = Math.sqrt(dx * dx + dy * dy);
			        if (r > CENTER) continue; // 超出圆形范围跳过
			
			        // HSV计算（中心黑，边缘彩色）
			        const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360; // 色相
			        const lightness = (r / CENTER) * 255; // 明度（0=黑 → 255=纯色）
			        const saturation = 255; // 饱和度
			
			        // HSL转RGB（直接计算像素值，避免CSS颜色解析问题）
			        const h = hue / 60;
			        const i = Math.floor(h);
			        const f = h - i;
			        const p = 0; // 饱和度100%，p=0
			        const q = lightness * (1 - f);
			        const t = lightness * f;
			        let rVal, gVal, bVal;
			
			        switch (i % 6) {
			          case 0: rVal = lightness; gVal = t; bVal = p; break;
			          case 1: rVal = q; gVal = lightness; bVal = p; break;
			          case 2: rVal = p; gVal = lightness; bVal = t; break;
			          case 3: rVal = p; gVal = q; bVal = lightness; break;
			          case 4: rVal = t; gVal = p; bVal = lightness; break;
			          case 5: rVal = lightness; gVal = p; bVal = q; break;
			        }
			
			        // 填充像素数据（RGBA）
			        const index = (y * CANVAS_SIZE + x) * 4;
			        data[index] = Math.round(rVal);     // R
			        data[index + 1] = Math.round(gVal); // G
			        data[index + 2] = Math.round(bVal); // B
			        data[index + 3] = 255;             // A
			      }
			    }
			
			    // 一次性绘制到Canvas（避免逐像素fillRect的性能问题）
			    ctx.putImageData(imageData, 0, 0);
			  };
			
			  // 立即绘制色轮（确保页面加载就显示，无空白）
			  drawColorWheel();
			
			  // 4. 更新选中色值
			  const updateColor = (color) => {
			    currentColor = color.toLowerCase();
			    $('#color-value').css({
					'background-color': currentColor, 
				  });
			    $('.fixed-color-item').removeClass('active');
			    $(`.fixed-color-item[data-color="${currentColor}"]`).addClass('active');
			  };
			
			  // 5. 色轮点击/拖动选色（适配Canvas缩放后的坐标）
			  $wheel.on('mousedown mousemove', function(e) {
			    if (e.type === 'mousemove' && !e.buttons) return;
			
			    // 获取Canvas的实际显示区域
			    const rect = canvas.getBoundingClientRect();
			    // 计算点击位置在Canvas原始像素中的坐标（适配缩放）
			    const x = Math.round((e.clientX - rect.left) * (CANVAS_SIZE / rect.width));
			    const y = Math.round((e.clientY - rect.top) * (CANVAS_SIZE / rect.height));
			
			    // 边界判断
			    if (x < 0 || x >= CANVAS_SIZE || y < 0 || y >= CANVAS_SIZE) return;
			
			    // 获取像素色值
			    const pixel = ctx.getImageData(x, y, 1, 1).data;
			    const hex = `#${
			      pixel[0].toString(16).padStart(2, '0') +
			      pixel[1].toString(16).padStart(2, '0') +
			      pixel[2].toString(16).padStart(2, '0')
			    }`;
			    updateColor(hex);
			  });
			
			  // 6. 固定色点击选色
			  $('.fixed-color-item').click(function() {
			    updateColor($(this).data('color'));
			  });
			
			  // 初始化显示默认色
			  updateColor(currentColor);
			});
		</script>
