name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: |
          cd server
          pip install -r requirements-dev.txt

      - name: Run pytest (unit + integration)
        run: |
          cd server
          python -m pytest tests/ -v --tb=short

      - name: Init database
        run: |
          cd server
          python seed.py

      - name: Start server
        run: |
          cd server
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/api/health || exit 1

      - name: Run bash API tests
        run: |
          cd server
          ADMIN_API_KEY=hair-admin-dev-2026 bash test_api.sh http://127.0.0.1:8000

      - name: Verify OpenAPI spec
        run: |
          curl -s http://127.0.0.1:8000/openapi.json | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          assert len(d['paths']) >= 10, 'OpenAPI endpoint count too low'
          print(f'✅ OpenAPI: {len(d[\"paths\"])} endpoints')
          "
